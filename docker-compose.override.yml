services:
  toydb-routing:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
      - ASPNETCORE_Kestrel__Certificates__Default__Password=password
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - ./certs:/https:ro
  toydb-p1-r1:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
      - ASPNETCORE_Kestrel__Certificates__Default__Password=password
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - NODE_NAME=ToyDb-P1-R1
      - Replica__Role=primary
      - Replica__NodeId=p1-r1
      - Replica__PartitionId=p1
      - Cluster__NodeId=p1-r1
      - Cluster__PartitionId=p1
      - Cluster__PeerAddresses__0=https://toydb-p1-r2:8081
      - Cluster__PeerAddresses__1=https://toydb-p1-r3:8081
    ports:
      - "8082:8080"
      - "8083:8081"
    volumes:
      - ./certs:/https:ro
