      - NODE_NAME=ToyDb-P1-R2
      - Replica__Role=secondary
      - Replica__PrimaryAddress=https://toydb-p1-r1:8081
      - Replica__NodeId=p1-r2
      - Replica__PartitionId=p1
      - Cluster__NodeId=p1-r2
      - Cluster__PartitionId=p1
