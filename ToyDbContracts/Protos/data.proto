syntax = "proto3";

import "google/protobuf/wrappers.proto";
import "google/protobuf/timestamp.proto";

option csharp_namespace = "ToyDbContracts.Data";

enum DataType {
  Null = 0;
  Bool = 1;
  Int = 2;
  Long = 3;
  Float = 4;
  Double = 5;
  String = 6;
}

message KeyValueRequest {
	google.protobuf.Timestamp timestamp = 1;
	DataType type = 2;
	string key = 3;
	google.protobuf.BytesValue value = 4;
}

message KeyValueResponse {
	google.protobuf.Timestamp timestamp = 1;
	DataType type = 2;
	string key = 3;
	google.protobuf.BytesValue value = 4;
}

service Data {
	rpc GetValue (GetRequest) returns (KeyValueResponse);
	rpc GetAllValues (GetAllValuesRequest) returns (GetAllValuesResponse);
	rpc SetValue (KeyValueRequest) returns (KeyValueResponse);
	rpc DeleteValue (DeleteRequest) returns (DeleteResponse);
	rpc StreamReplicationLog (StreamReplicationLogRequest) returns (stream ReplicationLogEntryMessage);
}

message GetRequest {
	string key = 1;
}

message GetAllValuesRequest {
}

message GetAllValuesResponse {
	repeated KeyValueResponse values = 1;
}

message DeleteRequest { 
	google.protobuf.Timestamp timestamp = 1;
	string key = 2;
}

message DeleteResponse {
	repeated string warnings = 1;
}

message StreamReplicationLogRequest {
	int64 from_lsn = 1;
}

message ReplicationLogEntryMessage {
	int64 lsn = 1;
	google.protobuf.Timestamp timestamp = 2;
	DataType type = 3;
	string key = 4;
	google.protobuf.BytesValue value = 5;
}